################
### SOURCES  ###
################

source = ~/.config/hypr/conf/env.conf
source = ~/.config/hypr/conf/startup.conf
source = ~/.config/hypr/conf/animations.conf
source = ~/.config/hypr/conf/windowrules.conf
source = ~/.config/hypr/conf/keybinds.conf


################
### MONITORS ###
################

monitor = eDP-1, 1920x1080@144, 0x0, 1


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 3
    gaps_out = 8

    border_size = 1

    col.active_border   = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = false
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 10
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 4
        render_power = 3
        color        = rgba(1a1a1aee)
    }

    blur {
        enabled   = true
        size      = 3
        passes    = 1
        vibrancy  = 0.1696
    }
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo   = false
}


#############
### INPUT ###
#############

input {
    kb_layout  = us
    kb_variant =
    kb_model   =
    kb_options =
    kb_rules   =

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}
