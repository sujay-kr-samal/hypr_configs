palette = "catppuccin_mocha"

format = """
[╭─](surface1) $os$directory$git_branch$git_status
[╰─](surface1)$character """

right_format = """$cmd_duration$time"""

[cmd_duration]
min_time = 0
show_milliseconds = true
style = "bold yellow"
format = "[ ${duration}]($style) "

[time]
disabled = false
style = "bold surface1"
format = "[$time]($style)"
time_format = "%I:%M %p"

[os]
disabled = false
style = "bold lavender"

[os.symbols]
Linux = " "
Arch = " "

[directory]
style = "bold lavender"
truncation_length = 4
truncate_to_repo = true
format = "[ $path]($style) "

[git_branch]
symbol = " "
style = "bold mauve"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "󰩌 "
ahead = "⇡${count} "
behind = "⇣${count} "
untracked = "? "
modified = "! "
staged = "+ "
deleted = " "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold lavender)"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"